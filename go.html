<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0;url=https://www.playtruco.com" />
    <title>Redirecionando...</title>
    <style>
      body {
        background: #1a1a2e;
        color: #f0f0f0;
        font-family: "Inter", system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
      }
      .loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #c8a45a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      p { color: #9ca3af; font-size: 0.9rem; }
      a { color: #c8a45a; }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="spinner"></div>
      <p>Redirecionando para PlayTruco...</p>
      <p><a href="https://www.playtruco.com">Clique aqui se não redirecionar</a></p>
    </div>
    <script>
      // Fallback JS redirect
      setTimeout(function() {
        window.location.href = 'https://www.playtruco.com';
      }, 500);
    </script>
  </body>
</html>
